<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Tailscale Network</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 36, 0.94);
      --line: #31406d;
      --text: #e8ecf8;
      --muted: #9aa6c7;
      --self: #60a5fa;
      --online: #22c55e;
      --offline: #ef4444;
      --unknown: #fbbf24;
      --accent: #8b5cf6;
      --router: #06b6d4;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 35%),
        linear-gradient(180deg, #0a1020, #0b1020);
    }

    .topbar {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      pointer-events: none;
      z-index: 15;
    }

    .chips, .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .chip, .iconbtn, .toolbarbtn {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      backdrop-filter: blur(8px);
    }

    .chip {
      padding: 8px 10px;
      font-size: 12px;
    }

    .iconbtn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      cursor: pointer;
    }

    .toolbarbtn {
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .toolbarbtn.active {
      outline: 2px solid rgba(255,255,255,0.18);
    }

    #sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      padding: 10px 14px calc(14px + env(safe-area-inset-bottom, 0));
      max-height: 68vh;
      min-height: 104px;
      overflow: hidden;
      transform: translateY(58%);
      transition: transform 0.18s ease;
      z-index: 20;
      touch-action: none;
      will-change: transform;
    }

    #sheet.open {
      transform: translateY(0);
    }

    .handleWrap {
      padding: 4px 0 10px;
      display: grid;
      place-items: center;
      cursor: grab;
      touch-action: none;
    }

    .handle {
      width: 46px;
      height: 5px;
      border-radius: 999px;
      background: #6473a6;
    }

    .sheetContent {
      overflow: auto;
      max-height: calc(68vh - 30px);
      padding-bottom: 2px;
    }

    #controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 110px 110px;
      gap: 8px;
    }

    input, select, button {
      font: inherit;
    }

    #search, #status, #tagFilter, #specialFilter {
      width: 100%;
      background: #0d1430;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .sectionTitle {
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .legendItem {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .item .name {
      font-weight: 700;
      margin-bottom: 3px;
    }

    .item .meta {
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      margin: 4px 6px 0 0;
    }

    .badge.exit {
      border-color: var(--accent);
    }

    .badge.router {
      border-color: var(--router);
    }

    #details {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(10,16,32,0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(8px);
      z-index: 25;
      display: none;
      max-height: 58vh;
      overflow: auto;
    }

    #details.show {
      display: block;
    }

    #details h2 {
      margin: 0 0 8px;
      font-size: 17px;
      padding-right: 38px;
    }

    .kv {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 6px 10px;
      font-size: 13px;
    }

    .k {
      color: var(--muted);
    }

    .closebtn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #0d1430;
      color: var(--text);
      cursor: pointer;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.45;
    }

    @media (max-width: 899px) {
      .topbar {
        flex-direction: column;
      }
    }

    @media (min-width: 900px) {
      #sheet {
        left: 16px;
        right: auto;
        bottom: 16px;
        width: 390px;
        border: 1px solid var(--line);
        border-radius: 18px;
        transform: translateY(0);
        max-height: calc(100vh - 120px);
      }

      .handleWrap {
        cursor: default;
      }

      .sheetContent {
        max-height: calc(100vh - 180px);
      }

      #details {
        left: auto;
        width: 430px;
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <div class="topbar">
    <div class="chips">
      <div class="chip" id="generatedAtChip">generated: --</div>
      <div class="chip">drag • pinch • tap</div>
    </div>
    <div class="toolbar">
      <button class="toolbarbtn" id="recenterBtn">Recenter</button>
      <button class="toolbarbtn" id="freezeBtn">Freeze</button>
      <button class="toolbarbtn" id="refreshBtn">Auto-refresh</button>
      <button class="iconbtn" id="toggleSheet">☰</button>
    </div>
  </div>

  <div id="sheet">
    <div class="handleWrap" id="handleWrap">
      <div class="handle"></div>
    </div>

    <div class="sheetContent">
      <div id="controls">
        <div class="row">
          <input id="search" placeholder="Search name, IP, DNS, tag, OS">
          <select id="status">
            <option value="all">All</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>

        <div class="row3">
          <select id="tagFilter">
            <option value="all">All tags</option>
          </select>
          <select id="specialFilter">
            <option value="all">All roles</option>
            <option value="exit">Exit</option>
            <option value="router">Router</option>
            <option value="special">Special</option>
          </select>
          <button class="toolbarbtn" id="hideOfflineBtn">Hide offline</button>
        </div>
      </div>

      <div class="sectionTitle">Legend</div>
      <div class="legend">
        <div class="legendItem"><span class="dot" style="background: var(--self)"></span> This node</div>
        <div class="legendItem"><span class="dot" style="background: var(--online)"></span> Online</div>
        <div class="legendItem"><span class="dot" style="background: var(--offline)"></span> Offline</div>
        <div class="legendItem"><span class="dot" style="background: var(--unknown)"></span> Unknown</div>
        <div class="legendItem"><span class="badge exit">EXIT</span></div>
        <div class="legendItem"><span class="badge router">ROUTE</span></div>
      </div>

      <div class="sectionTitle">Nodes</div>
      <div class="list" id="list"></div>
      <div class="hint">
        This graph is built from <code>/status.json</code>, which comes from
        <code>tailscale status --json</code> on the server.
      </div>
    </div>
  </div>

  <div id="details">
    <button class="closebtn" id="closeDetails">✕</button>
    <div id="detailsBody"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const listEl = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const statusEl = document.getElementById('status');
  const tagFilterEl = document.getElementById('tagFilter');
  const specialFilterEl = document.getElementById('specialFilter');

  const detailsEl = document.getElementById('details');
  const detailsBodyEl = document.getElementById('detailsBody');
  const closeDetailsEl = document.getElementById('closeDetails');

  const sheetEl = document.getElementById('sheet');
  const handleWrapEl = document.getElementById('handleWrap');
  const toggleSheetEl = document.getElementById('toggleSheet');

  const recenterBtn = document.getElementById('recenterBtn');
  const freezeBtn = document.getElementById('freezeBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const hideOfflineBtn = document.getElementById('hideOfflineBtn');
  const generatedAtChip = document.getElementById('generatedAtChip');

  let W = 0;
  let H = 0;
  let DPR = Math.max(1, window.devicePixelRatio || 1);

  let payload = null;
  let graph = { nodes: [], edges: [] };
  let nodeMap = new Map();
  let selfNode = null;

  let selected = null;
  let draggingNode = null;
  let pointerDown = false;
  let moved = false;
  let dragStart = null;
  let lastPointer = null;
  let pinchStart = null;
  let activeTouches = new Map();

  let frozen = false;
  let autoRefresh = false;
  let hideOffline = false;
  let refreshTimer = null;

  let view = { x: 0, y: 0, scale: 1 };

  let sheetState = window.innerWidth >= 900 ? 'desktop' : 'collapsed';
  let sheetDrag = null;

  function css(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function esc(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  function statusText(n) {
    if (n.role === 'self') return 'self';
    if (n.online === true) return 'online';
    if (n.online === false) return 'offline';
    return 'unknown';
  }

  function nodeColor(n) {
    if (n.role === 'self') return css('--self');
    if (n.online === true) return css('--online');
    if (n.online === false) return css('--offline');
    return css('--unknown');
  }

  function isSpecial(n) {
    return !!(n.exitNode || n.exitNodeOption || n.subnetRouter);
  }

  function matchesSpecialFilter(n, special) {
    if (special === 'all') return true;
    if (special === 'exit') return !!(n.exitNode || n.exitNodeOption);
    if (special === 'router') return !!n.subnetRouter;
    if (special === 'special') return isSpecial(n);
    return true;
  }

  function normalizeNode(raw, role, fallbackId) {
    const tags = raw.tags || raw.Tags || [];
    const routes = raw.routes || raw.PrimaryRoutes || raw.AllowedIPs || [];
    const dns = (raw.dns || raw.DNSName || '').replace(/\.$/, '');
    const hostname = raw.hostname || raw.HostName || '';
    const ip = raw.ip || (raw.TailscaleIPs && raw.TailscaleIPs[0]) || '';

    return {
      id: String(raw.id ?? fallbackId),
      name: raw.name || (dns ? dns.split('.')[0] : hostname || String(fallbackId)),
      dns,
      hostname,
      ip,
      os: raw.os || raw.OS || '',
      tags,
      routes,
      online: role === 'self' ? true : (raw.online ?? raw.Online ?? null),
      active: role === 'self' ? true : (raw.active ?? raw.Active ?? null),
      relay: raw.relay || raw.Relay || '',
      exitNode: !!(raw.exitNode ?? raw.ExitNode),
      exitNodeOption: !!(raw.exitNodeOption ?? raw.ExitNodeOption),
      subnetRouter: routes.length > 0 || !!raw.subnetRouter,
      role,
      x: (Math.random() - 0.5) * 500,
      y: (Math.random() - 0.5) * 500,
      vx: 0,
      vy: 0,
      r: role === 'self' ? 21 : 12,
    };
  }

  function buildGraphFromStatus(status) {
    const nodes = [];
    const edges = [];

    const selfRaw = status.Self || {};
    const self = normalizeNode({
      id: 'self',
      name: dnsShort(selfRaw),
      dns: (selfRaw.DNSName || '').replace(/\.$/, ''),
      hostname: selfRaw.HostName || '',
      ip: (selfRaw.TailscaleIPs && selfRaw.TailscaleIPs[0]) || '',
      os: selfRaw.OS || '',
      tags: selfRaw.Tags || [],
      routes: selfRaw.PrimaryRoutes || selfRaw.AllowedIPs || [],
      online: true,
      active: true,
      relay: selfRaw.Relay || '',
      exitNode: !!selfRaw.ExitNode,
      exitNodeOption: !!selfRaw.ExitNodeOption,
      subnetRouter: (selfRaw.PrimaryRoutes || selfRaw.AllowedIPs || []).length > 0,
    }, 'self', 'self');

    self.x = 0;
    self.y = 0;
    self.r = 21;
    nodes.push(self);

    const peers = status.Peer || {};
    const peerNodes = [];

    for (const [peerId, peerRaw] of Object.entries(peers)) {
      const node = normalizeNode({
        id: peerId,
        name: dnsShort(peerRaw),
        dns: (peerRaw.DNSName || '').replace(/\.$/, ''),
        hostname: peerRaw.HostName || '',
        ip: (peerRaw.TailscaleIPs && peerRaw.TailscaleIPs[0]) || '',
        os: peerRaw.OS || '',
        tags: peerRaw.Tags || [],
        routes: peerRaw.PrimaryRoutes || peerRaw.AllowedIPs || [],
        online: peerRaw.Online ?? null,
        active: peerRaw.Active ?? null,
        relay: peerRaw.Relay || '',
        exitNode: !!peerRaw.ExitNode,
        exitNodeOption: !!peerRaw.ExitNodeOption,
        subnetRouter: (peerRaw.PrimaryRoutes || peerRaw.AllowedIPs || []).length > 0,
      }, 'peer', peerId);

      node.r = isSpecial(node) ? 14 : 12;
      peerNodes.push(node);
      edges.push({ source: 'self', target: node.id });
    }

    peerNodes.sort((a, b) => {
      const sa = a.online === true ? 0 : a.online === false ? 2 : 1;
      const sb = b.online === true ? 0 : b.online === false ? 2 : 1;
      if (sa !== sb) return sa - sb;
      return a.name.localeCompare(b.name);
    });

    nodes.push(...peerNodes);

    const allTags = [...new Set(nodes.flatMap(n => n.tags || []))].sort();

    return {
      generatedAt: status._meta?.generatedAtISO || new Date().toISOString(),
      nodes,
      edges,
      allTags,
    };
  }

  function dnsShort(obj) {
    const dns = (obj.DNSName || '').replace(/\.$/, '');
    if (dns) return dns.split('.')[0];
    return obj.HostName || obj.Name || 'node';
  }

  function rebuildMaps() {
    nodeMap = new Map(graph.nodes.map(n => [n.id, n]));
    graph.edges.forEach(e => {
      e.a = nodeMap.get(e.source);
      e.b = nodeMap.get(e.target);
    });
    selfNode = graph.nodes.find(n => n.role === 'self') || null;
  }

  function applyPayload(newPayload, keepPositions = true) {
    const oldMap = new Map(graph.nodes.map(n => [n.id, n]));
    payload = newPayload;

    graph = {
      nodes: newPayload.nodes.map(n => {
        const old = oldMap.get(n.id);
        const node = {
          ...n,
          x: keepPositions && old ? old.x : n.x,
          y: keepPositions && old ? old.y : n.y,
          vx: keepPositions && old ? old.vx : 0,
          vy: keepPositions && old ? old.vy : 0,
          r: n.role === 'self' ? 21 : (isSpecial(n) ? 14 : 12),
        };
        return node;
      }),
      edges: newPayload.edges.map(e => ({ source: e.source, target: e.target })),
    };

    rebuildMaps();

    if (selfNode) {
      selfNode.x = keepPositions && oldMap.get(selfNode.id) ? selfNode.x : 0;
      selfNode.y = keepPositions && oldMap.get(selfNode.id) ? selfNode.y : 0;
    }

    populateTagFilter();
    generatedAtChip.textContent = `generated: ${payload.generatedAt}`;
    renderList();
    draw();

    if (selected) {
      selected = nodeMap.get(selected.id) || null;
      if (selected) {
        showDetails(selected);
      } else {
        hideDetails();
      }
    }
  }

  function populateTagFilter() {
    const current = tagFilterEl.value || 'all';
    tagFilterEl.innerHTML = '<option value="all">All tags</option>';
    for (const tag of payload.allTags || []) {
      const opt = document.createElement('option');
      opt.value = tag;
      opt.textContent = tag;
      tagFilterEl.appendChild(opt);
    }
    if ([...tagFilterEl.options].some(opt => opt.value === current)) {
      tagFilterEl.value = current;
    }
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.max(1, window.devicePixelRatio || 1);

    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    if (window.innerWidth >= 900) {
      sheetState = 'desktop';
      sheetEl.classList.add('open');
      sheetEl.style.transform = '';
    } else if (sheetState === 'desktop') {
      sheetState = 'collapsed';
      applySheetState(false);
    }

    draw();
  }

  function getFilteredNodes() {
    const q = searchEl.value.trim().toLowerCase();
    const status = statusEl.value;
    const tag = tagFilterEl.value;
    const special = specialFilterEl.value;

    return graph.nodes.filter(n => {
      if (hideOffline && n.role !== 'self' && n.online === false) return false;

      const okStatus = status === 'all' || n.role === 'self' || statusText(n) === status;
      if (!okStatus) return false;

      if (!matchesSpecialFilter(n, special)) return false;

      if (tag !== 'all' && !(n.tags || []).includes(tag)) return false;

      if (!q) return true;

      const hay = [
        n.name, n.ip, n.dns, n.hostname, n.os,
        ...(n.tags || []),
        ...(n.routes || []),
      ].join(' ').toLowerCase();

      return hay.includes(q);
    });
  }

  function getFilteredEdges(filteredNodes) {
    const ids = new Set(filteredNodes.map(n => n.id));
    return graph.edges.filter(e => ids.has(e.source) && ids.has(e.target));
  }

  function renderList() {
    const nodes = getFilteredNodes()
      .filter(n => n.role !== 'self')
      .sort((a, b) => {
        const sa = a.online === true ? 0 : a.online === false ? 2 : 1;
        const sb = b.online === true ? 0 : b.online === false ? 2 : 1;
        if (sa !== sb) return sa - sb;
        return a.name.localeCompare(b.name);
      });

    listEl.innerHTML = '';

    for (const n of nodes) {
      const el = document.createElement('div');
      el.className = 'item';

      const badges = [];
      if (n.exitNode || n.exitNodeOption) badges.push('<span class="badge exit">EXIT</span>');
      if (n.subnetRouter) badges.push('<span class="badge router">ROUTE</span>');
      for (const t of (n.tags || []).slice(0, 4)) {
        badges.push(`<span class="badge">${esc(t)}</span>`);
      }

      el.innerHTML = `
        <div class="name">${esc(n.name)}</div>
        <div class="meta">${esc(statusText(n))} · ${esc(n.ip || 'n/a')} · ${esc(n.os || 'unknown')}</div>
        <div>${badges.join('')}</div>
      `;

      el.onclick = () => {
        selected = n;
        focusNode(n);
        showDetails(n);
        draw();
      };

      listEl.appendChild(el);
    }
  }

  function showDetails(n) {
    const tags = (n.tags || []).length
      ? n.tags.map(t => `<span class="badge">${esc(t)}</span>`).join('')
      : '<span class="badge">none</span>';

    const routes = (n.routes || []).length
      ? n.routes.map(r => `<span class="badge router">${esc(r)}</span>`).join('')
      : '<span class="badge">none</span>';

    detailsBodyEl.innerHTML = `
      <h2>${esc(n.name)}</h2>
      <div class="kv">
        <div class="k">Status</div><div>${esc(statusText(n))}</div>
        <div class="k">IP</div><div>${esc(n.ip || 'n/a')}</div>
        <div class="k">DNS</div><div>${esc(n.dns || 'n/a')}</div>
        <div class="k">Hostname</div><div>${esc(n.hostname || 'n/a')}</div>
        <div class="k">OS</div><div>${esc(n.os || 'n/a')}</div>
        <div class="k">Active</div><div>${esc(String(n.active))}</div>
        <div class="k">Relay</div><div>${esc(n.relay || 'unknown')}</div>
        <div class="k">Exit node</div><div>${n.exitNode ? 'yes' : 'no'}</div>
        <div class="k">Exit option</div><div>${n.exitNodeOption ? 'yes' : 'no'}</div>
        <div class="k">Subnet router</div><div>${n.subnetRouter ? 'yes' : 'no'}</div>
        <div class="k">Tags</div><div>${tags}</div>
        <div class="k">Routes</div><div>${routes}</div>
      </div>
    `;

    detailsEl.classList.add('show');
  }

  function hideDetails() {
    detailsEl.classList.remove('show');
  }

  function worldToScreen(x, y) {
    return {
      x: W / 2 + (x + view.x) * view.scale,
      y: H / 2 + (y + view.y) * view.scale,
    };
  }

  function screenToWorld(x, y) {
    return {
      x: (x - W / 2) / view.scale - view.x,
      y: (y - H / 2) / view.scale - view.y,
    };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const filteredNodes = getFilteredNodes();
    const filteredEdges = getFilteredEdges(filteredNodes);

    for (const e of filteredEdges) {
      if (!e.a || !e.b) continue;
      const a = worldToScreen(e.a.x, e.a.y);
      const b = worldToScreen(e.b.x, e.b.y);

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(120,140,190,0.55)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    for (const n of filteredNodes) {
      const p = worldToScreen(n.x, n.y);
      const r = n.r * Math.max(0.9, Math.min(1.4, view.scale));

      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = nodeColor(n);
      ctx.fill();

      if (selected && selected.id === n.id) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (n.exitNode || n.exitNodeOption) {
        ctx.beginPath();
        ctx.arc(p.x + r * 0.85, p.y - r * 0.85, 6, 0, Math.PI * 2);
        ctx.fillStyle = css('--accent');
        ctx.fill();
      }

      if (n.subnetRouter) {
        ctx.beginPath();
        ctx.arc(p.x - r * 0.85, p.y - r * 0.85, 6, 0, Math.PI * 2);
        ctx.fillStyle = css('--router');
        ctx.fill();
      }

      ctx.fillStyle = '#e8ecf8';
      ctx.font = '12px system-ui, sans-serif';
      ctx.textAlign = 'center';
      const label = n.name.length > 22 ? n.name.slice(0, 19) + '...' : n.name;
      ctx.fillText(label, p.x, p.y + r + 16);
    }
  }

  function tick() {
    if (!frozen) {
      const nodes = graph.nodes;
      const edges = graph.edges;

      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          let dx = b.x - a.x;
          let dy = b.y - a.y;
          let d2 = dx * dx + dy * dy + 0.01;
          let d = Math.sqrt(d2);
          let force = 1800 / d2;

          let fx = force * dx / d;
          let fy = force * dy / d;

          if (a !== selfNode && a !== draggingNode) {
            a.vx -= fx;
            a.vy -= fy;
          }
          if (b !== selfNode && b !== draggingNode) {
            b.vx += fx;
            b.vy += fy;
          }
        }
      }

      for (const e of edges) {
        if (!e.a || !e.b) continue;

        const a = e.a;
        const b = e.b;
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let d = Math.sqrt(dx * dx + dy * dy) + 0.01;
        let target = (a === selfNode || b === selfNode) ? 185 : 125;

        if (a.subnetRouter || b.subnetRouter) target += 20;
        if (a.exitNode || a.exitNodeOption || b.exitNode || b.exitNodeOption) target += 10;

        let k = 0.006;
        let force = (d - target) * k;
        let fx = force * dx / d;
        let fy = force * dy / d;

        if (a !== selfNode && a !== draggingNode) {
          a.vx += fx;
          a.vy += fy;
        }
        if (b !== selfNode && b !== draggingNode) {
          b.vx -= fx;
          b.vy -= fy;
        }
      }

      for (const n of nodes) {
        if (n === selfNode) {
          n.x *= 0.9;
          n.y *= 0.9;
          n.vx = 0;
          n.vy = 0;
          continue;
        }

        if (n === draggingNode) continue;

        n.vx *= 0.92;
        n.vy *= 0.92;
        n.x += n.vx;
        n.y += n.vy;
      }
    }

    draw();
    requestAnimationFrame(tick);
  }

  function findNodeAtScreen(x, y) {
    const filteredNodes = getFilteredNodes();
    for (let i = filteredNodes.length - 1; i >= 0; i--) {
      const n = filteredNodes[i];
      const p = worldToScreen(n.x, n.y);
      const r = n.r * Math.max(0.9, Math.min(1.4, view.scale)) + 8;
      const dx = x - p.x;
      const dy = y - p.y;
      if (dx * dx + dy * dy <= r * r) return n;
    }
    return null;
  }

  function focusNode(n) {
    view.x = -n.x;
    view.y = -n.y;
  }

  function recenter() {
    view.x = 0;
    view.y = 0;
    view.scale = 1;
    if (selfNode) focusNode(selfNode);
    draw();
  }

  function setFrozen(next) {
    frozen = next;
    freezeBtn.classList.toggle('active', frozen);
    freezeBtn.textContent = frozen ? 'Unfreeze' : 'Freeze';

    if (frozen) {
      for (const n of graph.nodes) {
        n.vx = 0;
        n.vy = 0;
      }
      draw();
    }
  }

  function setHideOffline(next) {
    hideOffline = next;
    hideOfflineBtn.classList.toggle('active', hideOffline);
    hideOfflineBtn.textContent = hideOffline ? 'Show offline' : 'Hide offline';
    renderList();
    draw();
  }

  async function fetchStatus() {
    const res = await fetch(`/status.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) {
      throw new Error(`status request failed: ${res.status}`);
    }
    return res.json();
  }

  async function refreshStatus(keepPositions = true) {
    const status = await fetchStatus();
    const nextPayload = buildGraphFromStatus(status);
    applyPayload(nextPayload, keepPositions);
  }

  async function setAutoRefresh(next) {
    autoRefresh = next;
    refreshBtn.classList.toggle('active', autoRefresh);
    refreshBtn.textContent = autoRefresh ? 'Stop refresh' : 'Auto-refresh';

    if (refreshTimer) {
      clearInterval(refreshTimer);
      refreshTimer = null;
    }

    if (autoRefresh) {
      try {
        await refreshStatus(true);
      } catch (err) {
        console.error(err);
      }
      refreshTimer = setInterval(() => {
        refreshStatus(true).catch(err => console.error(err));
      }, 10000);
    }
  }

  function applySheetState(animate = true) {
    if (window.innerWidth >= 900) {
      sheetEl.classList.add('open');
      sheetEl.style.transition = animate ? 'transform 0.18s ease' : 'none';
      sheetEl.style.transform = '';
      return;
    }

    sheetEl.style.transition = animate ? 'transform 0.18s ease' : 'none';

    if (sheetState === 'open') {
      sheetEl.classList.add('open');
      sheetEl.style.transform = 'translateY(0)';
    } else {
      sheetEl.classList.remove('open');
      sheetEl.style.transform = 'translateY(58%)';
    }
  }

  function toggleSheet() {
    if (window.innerWidth >= 900) return;
    sheetState = sheetState === 'open' ? 'collapsed' : 'open';
    applySheetState(true);
  }

  function startSheetDrag(clientY) {
    if (window.innerWidth >= 900) return;
    sheetDrag = {
      startY: clientY,
      startState: sheetState,
      deltaY: 0,
    };
    sheetEl.style.transition = 'none';
  }

  function moveSheetDrag(clientY) {
    if (!sheetDrag || window.innerWidth >= 900) return;

    sheetDrag.deltaY = clientY - sheetDrag.startY;
    const startPercent = sheetDrag.startState === 'open' ? 0 : 58;
    const pxPerPercent = Math.max(4, window.innerHeight * 0.01);
    let nextPercent = startPercent + (sheetDrag.deltaY / pxPerPercent);
    nextPercent = Math.max(0, Math.min(58, nextPercent));
    sheetEl.style.transform = `translateY(${nextPercent}%)`;
  }

  function endSheetDrag() {
    if (!sheetDrag || window.innerWidth >= 900) return;

    const threshold = 40;
    if (sheetDrag.startState === 'collapsed') {
      sheetState = sheetDrag.deltaY < -threshold ? 'open' : 'collapsed';
    } else {
      sheetState = sheetDrag.deltaY > threshold ? 'collapsed' : 'open';
    }

    sheetDrag = null;
    applySheetState(true);
  }

  canvas.addEventListener('pointerdown', (e) => {
    pointerDown = true;
    moved = false;
    dragStart = { x: e.clientX, y: e.clientY };
    lastPointer = { x: e.clientX, y: e.clientY };
    const hit = findNodeAtScreen(e.clientX, e.clientY);
    draggingNode = hit;
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!pointerDown || pinchStart) return;

    const dx = e.clientX - lastPointer.x;
    const dy = e.clientY - lastPointer.y;

    if (Math.abs(e.clientX - dragStart.x) > 4 || Math.abs(e.clientY - dragStart.y) > 4) {
      moved = true;
    }

    if (draggingNode) {
      const w = screenToWorld(e.clientX, e.clientY);
      draggingNode.x = w.x;
      draggingNode.y = w.y;
      draggingNode.vx = 0;
      draggingNode.vy = 0;
    } else {
      view.x += dx / view.scale;
      view.y += dy / view.scale;
    }

    lastPointer = { x: e.clientX, y: e.clientY };
    draw();
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!moved) {
      const hit = findNodeAtScreen(e.clientX, e.clientY);
      if (hit) {
        selected = hit;
        showDetails(hit);
        draw();
      }
    }
    pointerDown = false;
    draggingNode = null;
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const scaleFactor = e.deltaY < 0 ? 1.08 : 0.92;
    const before = screenToWorld(e.clientX, e.clientY);
    view.scale = Math.max(0.35, Math.min(2.5, view.scale * scaleFactor));
    const after = screenToWorld(e.clientX, e.clientY);
    view.x += after.x - before.x;
    view.y += after.y - before.y;
    draw();
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    for (const t of e.changedTouches) {
      activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
    }
    if (activeTouches.size === 2) {
      const pts = [...activeTouches.values()];
      const dx = pts[1].x - pts[0].x;
      const dy = pts[1].y - pts[0].y;
      pinchStart = {
        dist: Math.hypot(dx, dy),
        scale: view.scale,
      };
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    for (const t of e.changedTouches) {
      activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
    }

    if (activeTouches.size === 2 && pinchStart) {
      const pts = [...activeTouches.values()];
      const cx = (pts[0].x + pts[1].x) / 2;
      const cy = (pts[0].y + pts[1].y) / 2;
      const before = screenToWorld(cx, cy);

      const dx = pts[1].x - pts[0].x;
      const dy = pts[1].y - pts[0].y;
      const dist = Math.hypot(dx, dy) || pinchStart.dist;

      view.scale = Math.max(0.35, Math.min(2.5, pinchStart.scale * (dist / pinchStart.dist)));

      const after = screenToWorld(cx, cy);
      view.x += after.x - before.x;
      view.y += after.y - before.y;
      draw();
    }
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    for (const t of e.changedTouches) {
      activeTouches.delete(t.identifier);
    }
    if (activeTouches.size < 2) pinchStart = null;
  }, { passive: true });

  handleWrapEl.addEventListener('pointerdown', (e) => {
    startSheetDrag(e.clientY);
    handleWrapEl.setPointerCapture(e.pointerId);
  });

  handleWrapEl.addEventListener('pointermove', (e) => {
    if (!sheetDrag) return;
    moveSheetDrag(e.clientY);
  });

  handleWrapEl.addEventListener('pointerup', () => {
    endSheetDrag();
  });

  handleWrapEl.addEventListener('pointercancel', () => {
    endSheetDrag();
  });

  toggleSheetEl.addEventListener('click', toggleSheet);
  closeDetailsEl.addEventListener('click', hideDetails);

  recenterBtn.addEventListener('click', recenter);

  freezeBtn.addEventListener('click', () => {
    setFrozen(!frozen);
  });

  hideOfflineBtn.addEventListener('click', () => {
    setHideOffline(!hideOffline);
  });

  refreshBtn.addEventListener('click', () => {
    setAutoRefresh(!autoRefresh);
  });

  searchEl.addEventListener('input', () => {
    renderList();
    draw();
  });

  statusEl.addEventListener('change', () => {
    renderList();
    draw();
  });

  tagFilterEl.addEventListener('change', () => {
    renderList();
    draw();
  });

  specialFilterEl.addEventListener('change', () => {
    renderList();
    draw();
  });

  window.addEventListener('resize', resize);

  async function init() {
    resize();
    applySheetState(false);

    try {
      const status = await fetchStatus();
      const firstPayload = buildGraphFromStatus(status);
      applyPayload(firstPayload, false);
      recenter();
      setFrozen(false);
      requestAnimationFrame(tick);
    } catch (err) {
      console.error(err);
      generatedAtChip.textContent = 'generated: error';
    }
  }

  init();
})();
</script>
</body>
</html>
